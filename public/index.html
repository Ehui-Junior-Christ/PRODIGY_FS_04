<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prodigy Chat | Messagerie Temps Réel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet" media="all">
    <link rel="stylesheet" href="style.css?v=7.0">
    <link rel="icon" href="data:,">
</head>
<body>
    <div id="auth-container" class="auth-wrapper">
        <div class="auth-card">
            <h1 class="brand-title">Prodigy<span>Chat</span></h1>
            <p class="auth-subtitle">Messagerie en temps réel. Édition premium.</p>
            
            <div class="tabs">
                <button class="tab active" data-tab="login">Connexion</button>
                <button class="tab" data-tab="register">Créer un compte</button>
            </div>

            <form id="auth-form">
                <div class="input-group">
                    <label for="username">Identifiant</label>
                    <input type="text" id="username" autocomplete="off" required placeholder="Votre nom d'utilisateur">
                </div>
                <div class="input-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" required placeholder="Votre mot de passe secret">
                </div>
                <div id="auth-error" class="error-message"></div>
                <button type="submit" class="btn-primary" id="auth-submit">Accéder à l'interface</button>
            </form>
        </div>
    </div>

    <div id="app-container" class="app-wrapper hidden">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2 class="brand-title-small">Prodigy</h2>
                <div class="user-profile">
                    <div class="avatar" id="current-user-avatar">U</div>
                    <span id="current-username">Utilisateur</span>
                    <button id="logout-btn" class="btn-icon" title="Déconnexion">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    </button>
                </div>
            </div>

            <div class="sidebar-content">
                <div class="section">
                    <h3 style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                        Canaux
                        <button class="btn-icon" id="create-room-btn" title="Créer un canal" style="padding: 2px; border-radius: 4px; display: flex; align-items: center; justify-content: center;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        </button>
                    </h3>
                    <div class="search-box" style="margin-bottom: 1rem;">
                        <input type="text" id="room-search-input" placeholder="Rechercher un canal..." autocomplete="off" style="width: 100%; padding: 0.5rem 0.75rem; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-base); color: var(--text-primary); font-size: 0.85rem;">
                    </div>
                    <ul class="room-list" id="room-list">
                        <li class="active" data-room="1"># Général</li>
                    </ul>
                </div>

                <div class="section">
                    <h3>Membres <span class="badge" id="online-count">0</span></h3>
                    <ul class="user-list" id="users-list">
                        <!-- Users dynamically inserted here -->
                    </ul>
                </div>
            </div>
        </aside>

        <main class="chat-area">
            <header class="chat-header">
                <div style="display: flex; align-items: center;">
                    <button class="btn-icon menu-toggle-btn" id="menu-toggle-btn" title="Ouvrir le menu">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                    </button>
                    <div class="chat-header-info">
                        <h2 id="current-room-name"># Général</h2>
                        <p class="status-indicator">
                            <span class="dot online"></span>
                            Connecté
                        </p>
                    </div>
                </div>
                <div class="chat-header-actions" id="room-actions-container" style="display: flex; gap: 0.5rem; align-items: center;">
                    <button id="toggle-lock-btn" class="btn-icon hidden" title="Verrouiller/Déverrouiller le canal">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lock-icon"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    </button>
                    <button id="invite-member-btn" class="btn-icon hidden" title="Inviter un membre">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
                    </button>
                </div>
            </header>

            <div class="messages-container" id="messages-container">
                <!-- Messages dynamically inserted here -->
            </div>
            
            <div class="typing-indicator hidden" id="typing-indicator">
                <span></span><span></span><span></span>
            </div>

            <footer class="chat-input-area">
                <div id="reply-preview-container" class="reply-preview-container hidden">
                    <div class="reply-preview-accent"></div>
                    <div class="reply-preview-body">
                        <span class="reply-preview-username" id="reply-preview-username">Répondre à ...</span>
                        <p class="reply-preview-text" id="reply-preview-text">Extrait du message</p>
                    </div>
                    <button type="button" class="reply-preview-close" id="reply-preview-close-btn" title="Annuler la réponse">×</button>
                </div>
                <div id="mention-dropdown" class="mention-dropdown"></div>
                <div id="sticker-popover" class="sticker-popover"></div>
                <form id="message-form">
                    <button type="button" class="btn-icon attach-btn" id="attach-btn" title="Joindre un fichier">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                    </button>
                    <button type="button" class="btn-icon mic-btn" id="mic-btn" title="Enregistrer un message vocal">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                    </button>
                    <button type="button" class="btn-icon sticker-btn" id="sticker-btn" title="Envoyer un Sticker">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"></path><path d="M12 11.5a1.5 1.5 0 1 1-1.5 1.5 1.5 1.5 0 0 1 1.5-1.5z"></path><path d="M8.5 9A1.5 1.5 0 1 1 7 10.5 1.5 1.5 0 0 1 8.5 9z"></path><path d="M15.5 9A1.5 1.5 0 1 1 14 10.5 1.5 1.5 0 0 1 15.5 9z"></path><path d="M8 15a4 4 0 0 0 8 0"></path></svg>
                    </button>
                    <div id="recording-timer" class="hidden" style="flex: 1; display: flex; align-items: center; gap: 8px; padding: 0 16px; color: var(--error); font-weight: 600; font-variant-numeric: tabular-nums;">
                        <span style="width: 10px; height: 10px; background: var(--error); border-radius: 50%; animation: pulse 1s infinite;"></span>
                        <span id="recording-time">00:00</span>
                    </div>
                    <input type="file" id="file-input" class="hidden" accept="image/*,video/*,.pdf,.doc,.docx">
                    <input type="text" id="message-input" placeholder="Écrivez votre message... (@ pour mentionner)" autocomplete="off">
                    <button type="submit" class="btn-icon send-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </form>
            </footer>
        </main>
    </div>

    <!-- Modal Création de Canal -->
    <div id="create-room-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <h3 class="modal-title">Créer un nouveau canal</h3>
            <div class="input-group" style="margin-top: 1.5rem; margin-bottom: 1rem;">
                <label for="new-room-name">Nom du canal</label>
                <input type="text" id="new-room-name" placeholder="ex: salon-vip" autocomplete="off">
            </div>
            <div class="input-group" style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem;">
                <input type="checkbox" id="new-room-locked" style="width: auto; padding: 0;">
                <label for="new-room-locked" style="margin: 0; text-transform: none; font-size: 0.9rem;">Canal privé (verrouillé par défaut)</label>
            </div>
            <div class="modal-actions">
                <button id="cancel-room-btn" class="btn-secondary">Annuler</button>
                <button id="confirm-room-btn" class="btn-primary" style="width: auto; padding: 0.75rem 1.5rem;">Créer</button>
            </div>
        </div>
    </div>

    <!-- Modal Invitation de Membre -->
    <div id="invite-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <h3 class="modal-title">Inviter un membre</h3>
            <div class="input-group" style="margin-top: 1.5rem; margin-bottom: 1.5rem;">
                <label for="invite-username">Nom d'utilisateur</label>
                <input type="text" id="invite-username" placeholder="ex: Alice" autocomplete="off">
            </div>
            <div class="modal-actions">
                <button id="cancel-invite-btn" class="btn-secondary">Annuler</button>
                <button id="confirm-invite-btn" class="btn-primary" style="width: auto; padding: 0.75rem 1.5rem;">Inviter</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js?v=7.0"></script>
</body>
</html>
