<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a20" />
      <stop offset="100%" stop-color="#09090b" />
    </radialGradient>
    <!-- Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea580c" />
      <stop offset="50%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#fb923c" />
    </linearGradient>
    <!-- Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Rounded App Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />
  
  <!-- Subtle border highlight -->
  <rect x="2" y="2" width="508" height="508" rx="110" fill="none" stroke="#27272a" stroke-width="4" />

  <!-- Logo Group -->
  <g transform="translate(128, 128)" filter="url(#glow)">
    <!-- Chat Icon Shape (Double Bubble) -->
    <!-- Large Bubble -->
    <path d="M 30,30 
             h 160 
             a 30,30 0 0 1 30,30 
             v 70 
             a 30,30 0 0 1 -30,30 
             h -100 
             l -50,40 
             v -40 
             a 30,30 0 0 1 -30,-30 
             v -70 
             a 30,30 0 0 1 30,-30 z" 
          fill="url(#accentGrad)" />
    
    <!-- White Letter 'P' Styled Cutout -->
    <path d="M 85,60 
             h 40 
             a 20,20 0 0 1 20,20 
             v 10 
             a 20,20 0 0 1 -20,20 
             h -20 
             v 30 
             h -20 
             z" 
          fill="#ffffff" />
          
    <circle cx="115" cy="85" r="8" fill="url(#accentGrad)" />
  </g>
</svg>
